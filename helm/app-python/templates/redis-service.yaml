{{- if .Values.redis }}
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.app.namespace }}
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    app: redis
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: {{ .Values.redis.service.targetPort }}
{{- end }}