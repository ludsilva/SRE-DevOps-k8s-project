apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-python
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ludsilva/SRE-DevOps-k8s-project
    targetRevision: HEAD
    path: helm/app-python

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true